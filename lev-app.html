<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Lev"/>
<meta name="theme-color" content="#080e0a"/>
<title>Lev e-bikes</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: #080e0a; font-family: 'DM Sans', system-ui, sans-serif; overflow: hidden; }
  #app { height: 100%; display: flex; flex-direction: column; max-width: 430px; margin: 0 auto; background: #080e0a; position: relative; }

  /* scrollable content */
  .content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .content::-webkit-scrollbar { display: none; }

  /* HEADER */
  .statusbar { padding: 52px 20px 0; display: flex; justify-content: space-between; align-items: center; }
  .header { padding: 10px 20px 14px; display: flex; justify-content: space-between; align-items: center; }
  .logo { height: 50px; width: auto; }
  .header-icons { display: flex; gap: 10px; }
  .icon-btn { width: 36px; height: 36px; border-radius: 10px; background: rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; font-size: 16px; border: none; cursor: pointer; }

  /* BOTTOM NAV */
  .bottom-nav { background: rgba(8,14,10,0.97); border-top: 1px solid rgba(61,252,120,0.1); padding: 10px 16px 34px; display: flex; justify-content: space-around; flex-shrink: 0; }
  .tab-btn { background: none; border: none; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 8px 20px; border-radius: 16px; position: relative; transition: background 0.2s; }
  .tab-btn.active { background: rgba(61,252,120,0.1); }
  .tab-btn .indicator { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 32px; height: 3px; background: linear-gradient(90deg,#3dfc78,#1acd55); border-radius: 0 0 4px 4px; }
  .tab-btn span.icon { font-size: 20px; }
  .tab-btn span.label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: rgba(255,255,255,0.35); transition: color 0.2s; }
  .tab-btn.active span.label { color: #3dfc78; }

  /* ===== CONNECT TAB ===== */
  .connect-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; position: relative; overflow: hidden; }
  .connect-glow { position: absolute; width: 340px; height: 340px; border-radius: 50%; background: radial-gradient(circle, rgba(61,252,120,0.07) 0%, transparent 70%); top: 50%; left: 50%; transform: translate(-50%,-60%); pointer-events: none; }
  .pulse-container { position: relative; display: flex; align-items: center; justify-content: center; width: 200px; height: 200px; margin-bottom: 48px; }
  .ring { position: absolute; border-radius: 50%; border: 2px solid rgba(61,252,120,0.3); animation: pulseRing 2.4s ease-out infinite; }
  .ring1 { width: 192px; height: 192px; animation-delay: 0s; }
  .ring2 { width: 144px; height: 144px; animation-delay: 0.8s; }
  .ring3 { width: 108px; height: 108px; animation-delay: 1.6s; }
  .bike-icon { width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg,#3dfc78,#1acd55); display: flex; align-items: center; justify-content: center; box-shadow: 0 0 40px rgba(61,252,120,0.5); font-size: 36px; z-index: 2; animation: floatBike 3s ease-in-out infinite; }
  .connect-title { font-size: 22px; font-weight: 800; color: #f0fdf4; margin-bottom: 8px; letter-spacing: -0.5px; text-align: center; }
  .connect-sub { color: #3dfc78; font-size: 13px; margin-bottom: 36px; opacity: 0.7; }
  .dots { display: flex; gap: 8px; margin-bottom: 44px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(61,252,120,0.25); transition: all 0.3s; }
  .dot.active { background: #3dfc78; box-shadow: 0 0 8px #3dfc78; }
  .phrase-card { background: rgba(61,252,120,0.07); border: 1px solid rgba(61,252,120,0.2); border-radius: 16px; padding: 18px 24px; max-width: 320px; text-align: center; }
  .phrase-card p { color: #a7ffcf; font-size: 14px; line-height: 1.5; }
  .stats-strip { display: flex; gap: 32px; margin-top: 36px; }
  .stat { text-align: center; }
  .stat .si { font-size: 20px; margin-bottom: 4px; }
  .stat .sl { font-size: 10px; color: rgba(61,252,120,0.6); letter-spacing: 0.5px; text-transform: uppercase; }

  /* ===== HISTORY TAB ===== */
  .history-wrap { padding: 20px 16px; }
  .summary-card { background: linear-gradient(135deg,rgba(61,252,120,0.15),rgba(26,205,85,0.08)); border: 1px solid rgba(61,252,120,0.25); border-radius: 20px; padding: 20px; margin-bottom: 24px; display: flex; justify-content: space-around; }
  .summary-item { text-align: center; }
  .summary-item .sv { font-size: 22px; font-weight: 800; color: #3dfc78; line-height: 1.1; }
  .summary-item .sl { font-size: 10px; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 0.5px; }
  .section-title { color: rgba(255,255,255,0.5); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
  .rides-list { display: flex; flex-direction: column; gap: 10px; padding-bottom: 20px; }
  .ride-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07); border-radius: 16px; padding: 16px; }
  .ride-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .ride-icon { width: 36px; height: 36px; border-radius: 10px; background: rgba(61,252,120,0.12); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .ride-info { margin-left: 10px; flex: 1; }
  .ride-route { font-size: 13px; font-weight: 700; color: #f0fdf4; }
  .ride-date { font-size: 11px; color: rgba(255,255,255,0.35); margin-top: 2px; }
  .ride-km { background: rgba(61,252,120,0.1); border: 1px solid rgba(61,252,120,0.2); border-radius: 8px; padding: 3px 8px; font-size: 11px; color: #3dfc78; font-weight: 600; }
  .ride-bottom { display: flex; gap: 16px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.05); align-items: center; }
  .ride-meta { display: flex; align-items: center; gap: 5px; font-size: 11px; color: rgba(255,255,255,0.45); }
  .ride-coins { margin-left: auto; font-size: 11px; color: rgba(61,252,120,0.7); font-weight: 600; }

  /* ===== REWARDS TAB ===== */
  .rewards-wrap { padding: 20px 16px; padding-bottom: 20px; }
  .coin-card { background: linear-gradient(135deg,#1acd55,#17a648); border-radius: 24px; padding: 24px; margin-bottom: 20px; position: relative; overflow: hidden; box-shadow: 0 8px 32px rgba(26,205,85,0.4); }
  .coin-bg1 { position: absolute; right: -20px; top: -20px; width: 120px; height: 120px; border-radius: 50%; background: rgba(255,255,255,0.07); }
  .coin-bg2 { position: absolute; right: 20px; bottom: -30px; width: 80px; height: 80px; border-radius: 50%; background: rgba(255,255,255,0.05); }
  .coin-label { font-size: 12px; color: rgba(255,255,255,0.7); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .coin-amount { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .coin-emoji { font-size: 48px; }
  .coin-number { font-size: 52px; font-weight: 900; color: #fff; line-height: 1; }
  .progress-label { font-size: 11px; color: rgba(255,255,255,0.6); margin-bottom: 6px; }
  .progress-bar { background: rgba(0,0,0,0.25); border-radius: 99px; height: 6px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg,#a7ffcf,#3dfc78); border-radius: 99px; }
  .mini-stats { display: flex; gap: 10px; margin-bottom: 24px; }
  .mini-stat { flex: 1; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 14px; text-align: center; }
  .mini-stat .mi { font-size: 20px; margin-bottom: 4px; }
  .mini-stat .mv { font-size: 18px; font-weight: 800; color: #3dfc78; }
  .mini-stat .ml { font-size: 10px; color: rgba(255,255,255,0.35); text-transform: uppercase; letter-spacing: 0.5px; }
  .rewards-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 16px; }
  .reward-card { border-radius: 20px; padding: 18px; display: flex; align-items: center; gap: 14px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); transition: all 0.3s; }
  .reward-card.redeemed { background: rgba(61,252,120,0.08); border-color: rgba(61,252,120,0.35); }
  .reward-card.locked { opacity: 0.6; }
  .reward-emoji-box { width: 56px; height: 56px; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 28px; flex-shrink: 0; }
  .reward-info { flex: 1; }
  .reward-name { font-size: 15px; font-weight: 700; color: #f0fdf4; margin-bottom: 3px; }
  .reward-desc { font-size: 12px; color: rgba(255,255,255,0.4); }
  .reward-cost { display: flex; align-items: center; gap: 4px; margin-top: 6px; font-size: 13px; font-weight: 700; }
  .redeem-btn { border: none; border-radius: 12px; padding: 10px 14px; font-size: 12px; font-weight: 700; cursor: pointer; min-width: 80px; text-align: center; flex-shrink: 0; transition: all 0.2s; }
  .tip-card { background: rgba(61,252,120,0.05); border: 1px dashed rgba(61,252,120,0.2); border-radius: 16px; padding: 16px; text-align: center; }
  .tip-card p { font-size: 12px; color: rgba(61,252,120,0.7); line-height: 1.5; }

  @keyframes pulseRing { 0%{transform:scale(0.5);opacity:0.8} 100%{transform:scale(1.8);opacity:0} }
  @keyframes floatBike { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
  @keyframes slideIn { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>

    <div class="header-icons">
      <button class="icon-btn">🔔</button>
      <button class="icon-btn">👤</button>
    </div>
  </div>

  <!-- CONTENT AREA -->
  <div class="content" id="content"></div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <button class="tab-btn active" id="tab-connect" onclick="switchTab('connect')">
      <div class="indicator" id="ind-connect"></div>
      <span class="icon">📡</span>
      <span class="label">Conectar</span>
    </button>
    <button class="tab-btn" id="tab-history" onclick="switchTab('history')">
      <span class="icon">📋</span>
      <span class="label">Histórico</span>
    </button>
    <button class="tab-btn" id="tab-rewards" onclick="switchTab('rewards')">
      <span class="icon">🎁</span>
      <span class="label">Recompensas</span>
    </button>
  </nav>

<script>
const rides = [
  {id:1,date:"19/05/2026",from:"Ipanema",to:"Leblon",duration:"18 min",km:2.4,day:"Ter"},
  {id:2,date:"17/05/2026",from:"Copacabana",to:"Botafogo",duration:"25 min",km:3.1,day:"Dom"},
  {id:3,date:"15/05/2026",from:"Leblon",to:"Barra da Tijuca",duration:"42 min",km:7.8,day:"Sex"},
  {id:4,date:"12/05/2026",from:"Flamengo",to:"Urca",duration:"20 min",km:2.9,day:"Ter"},
  {id:5,date:"10/05/2026",from:"Botafogo",to:"Humaitá",duration:"14 min",km:1.7,day:"Dom"},
  {id:6,date:"07/05/2026",from:"Jardim Botânico",to:"Gávea",duration:"16 min",km:2.2,day:"Qui"},
  {id:7,date:"03/05/2026",from:"Barra da Tijuca",to:"Recreio",duration:"35 min",km:5.6,day:"Dom"},
  {id:8,date:"30/04/2026",from:"Urca",to:"Flamengo",duration:"22 min",km:3.0,day:"Qui"},
];
const totalKm = rides.reduce((a,r)=>a+r.km,0);
const totalCoins = Math.floor(totalKm/100);

const rewards = [
  {id:1,name:"Adesivos Lev",cost:25,emoji:"🏷️",desc:"Pack com 5 adesivos exclusivos",color:"#3dfc78"},
  {id:2,name:"Cupom 10% OFF",cost:50,emoji:"🎟️",desc:"Desconto em qualquer corrida",color:"#facc15"},
  {id:3,name:"Brinde Surpresa",cost:40,emoji:"🎁",desc:"Só abrindo pra descobrir!",color:"#f472b6"},
];

const phrases = [
  "Cada km pedalado é uma vitória pro planeta 🌱",
  "Zero emissões, 100% atitude ⚡",
  "Bora mudar o Rio juntos 🚲",
  "Sua bike te espera por aí 🟢",
];

let currentTab = 'connect';
let redeemed = JSON.parse(localStorage.getItem('lev_redeemed')||'[]');
let phraseIdx = 0, dotIdx = 0;
let phraseTimer, dotTimer;

function saveRedeemed(){ localStorage.setItem('lev_redeemed', JSON.stringify(redeemed)); }

function switchTab(tab) {
  currentTab = tab;
  ['connect','history','rewards'].forEach(t => {
    const btn = document.getElementById('tab-'+t);
    const ind = document.getElementById('ind-'+t);
    btn.classList.toggle('active', t===tab);
    if(ind) ind.style.display = t===tab ? 'block' : 'none';
  });
  clearInterval(phraseTimer); clearInterval(dotTimer);
  renderTab(tab);
}

function updateClock() {
  const now = new Date();
  const h = now.getHours().toString().padStart(2,'0');
  const m = now.getMinutes().toString().padStart(2,'0');
  document.getElementById('clock').textContent = h+':'+m;
}
setInterval(updateClock, 1000); updateClock();

function renderTab(tab) {
  const c = document.getElementById('content');
  if(tab==='connect') renderConnect(c);
  else if(tab==='history') renderHistory(c);
  else renderRewards(c);
}

function renderConnect(c) {
  c.innerHTML = `
  <div class="connect-wrap">
    <div class="connect-glow"></div>
    <div class="pulse-container">
      <div class="ring ring1"></div>
      <div class="ring ring2"></div>
      <div class="ring ring3"></div>
      <div class="bike-icon">🚲</div>
    </div>
    <h2 class="connect-title" id="ctitle">Procurando Bicicleta Lev</h2>
    <p class="connect-sub">Bicicletas próximas de você</p>
    <div class="dots">
      <div class="dot active" id="d0"></div>
      <div class="dot" id="d1"></div>
      <div class="dot" id="d2"></div>
      <div class="dot" id="d3"></div>
      <div class="dot" id="d4"></div>
    </div>
    <div class="phrase-card"><p id="phrase">${phrases[0]}</p></div>
    <div class="stats-strip">
      <div class="stat"><div class="si">⚡</div><div class="sl">0g CO₂</div></div>
      <div class="stat"><div class="si">🌍</div><div class="sl">100% elétrico</div></div>
      <div class="stat"><div class="si">🔋</div><div class="sl">Carregando</div></div>
    </div>
  </div>`;
  let d=0, p=0;
  dotTimer = setInterval(()=>{
    document.querySelectorAll('.dot').forEach((el,i)=>{ el.classList.toggle('active',i===d%5); });
    const title = document.getElementById('ctitle');
    if(title) title.textContent = 'Procurando Bicicleta Lev'+'.'.repeat(d%4);
    d++;
  },500);
  phraseTimer = setInterval(()=>{
    p=(p+1)%phrases.length;
    const el=document.getElementById('phrase');
    if(el) el.textContent=phrases[p];
  },3200);
}

function renderHistory(c) {
  const co2total = (totalKm*0.15).toFixed(1);
  let ridesHtml = rides.map((r,i)=>{
    const co2 = (r.km*150/1000).toFixed(2);
    return `<div class="ride-card" style="animation:slideIn 0.4s ease ${i*0.05}s both">
      <div class="ride-top">
        <div style="display:flex;align-items:center;gap:10px;flex:1">
          <div class="ride-icon">🚲</div>
          <div class="ride-info">
            <div class="ride-route">${r.from} → ${r.to}</div>
            <div class="ride-date">${r.day}, ${r.date}</div>
          </div>
        </div>
        <div class="ride-km">${r.km} km</div>
      </div>
      <div class="ride-bottom">
        <div class="ride-meta">⏱ ${r.duration}</div>
        <div class="ride-meta">🌱 ${co2}kg CO₂</div>
        <div class="ride-coins">🪙 +${(r.km/100).toFixed(2)}</div>
      </div>
    </div>`;
  }).join('');
  c.innerHTML = `<div class="history-wrap">
    <div class="summary-card">
      <div class="summary-item"><div class="si">🚲</div><div class="sv">${totalKm.toFixed(1)} km</div><div class="sl">total pedalado</div></div>
      <div class="summary-item"><div class="si">🌿</div><div class="sv">${co2total}kg</div><div class="sl">CO₂ salvo</div></div>
      <div class="summary-item"><div class="si">⚡</div><div class="sv">${rides.length}</div><div class="sl">corridas</div></div>
    </div>
    <div class="section-title">Corridas recentes</div>
    <div class="rides-list">${ridesHtml}</div>
  </div>`;
}

function redeem(id) {
  if(redeemed.includes(id)) return;
  const btn = document.getElementById('rbtn-'+id);
  if(btn) btn.textContent='⏳';
  setTimeout(()=>{
    redeemed.push(id); saveRedeemed();
    renderTab('rewards');
  },1400);
}

function renderRewards(c) {
  const progress = ((totalKm%100)/100)*100;
  const rewardsHtml = rewards.map((r,i)=>{
    const canAfford = totalCoins >= r.cost;
    const done = redeemed.includes(r.id);
    const btnStyle = done
      ? 'background:rgba(61,252,120,0.2);color:#3dfc78;cursor:default'
      : canAfford
        ? `background:${r.color};color:#000;cursor:pointer`
        : 'background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.3);cursor:default';
    const btnText = done ? '✅ Ativo' : canAfford ? 'Resgatar' : '🔒';
    const cardClass = done ? 'reward-card redeemed' : !canAfford ? 'reward-card locked' : 'reward-card';
    return `<div class="${cardClass}" style="animation:slideIn 0.4s ease ${i*0.1}s both">
      <div class="reward-emoji-box" style="background:${r.color}18;border:1px solid ${r.color}40">${r.emoji}</div>
      <div class="reward-info">
        <div class="reward-name">${r.name}</div>
        <div class="reward-desc">${r.desc}</div>
        <div class="reward-cost" style="color:${r.color}">🪙 ${r.cost} moedas</div>
      </div>
      <button id="rbtn-${r.id}" class="redeem-btn" style="${btnStyle}" onclick="redeem(${r.id})">${btnText}</button>
    </div>`;
  }).join('');
  c.innerHTML = `<div class="rewards-wrap">
    <div class="coin-card">
      <div class="coin-bg1"></div><div class="coin-bg2"></div>
      <div class="coin-label">Suas Moedinhas</div>
      <div class="coin-amount"><span class="coin-emoji">🪙</span><span class="coin-number">${totalCoins}</span></div>
      <div class="progress-label">${(totalKm%100).toFixed(1)} / 100 km para próxima moeda</div>
      <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
    </div>
    <div class="mini-stats">
      <div class="mini-stat"><div class="mi">🚲</div><div class="mv">${totalKm.toFixed(1)} km</div><div class="ml">total pedalado</div></div>
      <div class="mini-stat"><div class="mi">🌿</div><div class="mv">${(totalKm*0.15).toFixed(2)}kg</div><div class="ml">CO₂ salvo</div></div>
    </div>
    <div class="section-title">Recompensas disponíveis</div>
    <div class="rewards-list">${rewardsHtml}</div>
    <div class="tip-card"><p>♻️ A cada 100 km você ganha 1 moeda.<br>Continue pedalando e ajudando o planeta!</p></div>
  </div>`;
}

// Init
renderTab('connect');
// Show indicator only on active
document.querySelectorAll('.tab-btn').forEach(btn=>{
  const ind = btn.querySelector('.indicator');
  if(ind && !btn.classList.contains('active')) ind.style.display='none';
});
</script>
</body>
</html>
